services:
  postgres:
    image: postgres:16-alpine
    container_name: grkd_jisho_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: grkd_jisho
      POSTGRES_USER: grkd
      POSTGRES_PASSWORD: grkd_dev
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grkd -d grkd_jisho"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
